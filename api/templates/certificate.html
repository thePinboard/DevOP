{% extends "base.html" %}
{% block content %}
<div class="text-center py-12">
{% if certificate.eligible %}
    <div class="bg-white rounded-2xl shadow-lg p-12 max-w-lg mx-auto">
        <div class="text-6xl mb-4">🏆</div>
        <h1 class="text-3xl font-bold text-green-600 mb-2">Herzlichen Glückwunsch!</h1>
        <p class="text-gray-600 text-lg mb-4">{{ user.username }} hat alle 7 Phasen abgeschlossen!</p>
        <div class="bg-green-50 border border-green-200 rounded-lg p-4">
            <p class="text-green-700 font-semibold">✅ Zertifikat verfügbar</p>
        </div>
    </div>
{% else %}
    <div class="bg-white rounded-2xl shadow-lg p-12 max-w-lg mx-auto">
        <div class="text-6xl mb-4">⏳</div>
        <h1 class="text-2xl font-bold text-gray-700 mb-2">Noch nicht fertig</h1>
        <p class="text-gray-500 mb-4">{{ certificate.message }}</p>
        <div class="w-full bg-gray-200 rounded-full h-4 mb-4">
            <div class="bg-blue-600 h-4 rounded-full"
                 style="width: {{ (certificate.completed_phases / 7 * 100)|int }}%"></div>
        </div>
        <a href="/dashboard/{{ user.id }}"
           class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700">
            Zurück zum Dashboard
        </a>
    </div>
{% endif %}
</div>
{% endblock %}
